name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.display }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: bl602
            display: BL602
            submodules: |
              platform/BL602_SDK
              platform/bouffalo_sdk
              platform/toolchain_gcc_t-head_linux
            project_dir: project/bl602
            build_cmd: make
            merged: project/bl602/build_out/whole_flash_data.bin
            raw: |
              project/bl602/build_out/at.bin
              platform/bouffalo_sdk/tools/bflb_tools/bouffalo_flash_cube/chips/bl602/boot2/boot2.bin
              platform/bouffalo_sdk/tools/bflb_tools/bouffalo_flash_cube/chips/bl602/partition/partition_cfg.toml
              platform/bouffalo_sdk/tools/bflb_tools/bouffalo_flash_cube/chips/bl602/device_tree/bl_factory_params.dts
            ota: |
              project/bl602/build_out/FW_OTA.bin.xz
            elf: |
              project/bl602/build_out/at.elf

          - id: bl616
            display: BL616 / BL618
            submodules: |
              platform/bouffalo_sdk
              platform/toolchain_gcc_t-head_linux
            project_dir: project/bl616
            build_cmd: make
            merged: project/bl616/build/build_out/whole_flash_data.bin
            raw: |
              project/bl616/build/build_out/at_bl616.bin
              platform/bouffalo_sdk/tools/bflb_tools/bouffalo_flash_cube/chips/bl616/boot2/boot2.bin
              platform/bouffalo_sdk/tools/bflb_tools/bouffalo_flash_cube/chips/bl616/partition/partition_cfg.toml
              platform/bouffalo_sdk/tools/bflb_tools/bouffalo_flash_cube/chips/bl616/device_tree/bl_factory_params.dts
            ota: |
              project/bl616/build/build_out/FW_OTA.bin.xz
            elf: |
              project/bl616/build/build_out/at_bl616.elf

          - id: amebad
            display: Ameba D (RTL8721D / RTL8710C)
            submodules: |
              platform/ameba-rtos-d
            project_dir: project/amebad
            build_cmd: make
            merged: project/amebad/out/Image_All.bin
            raw: |
              project/amebad/out/km0_boot_all.bin
              project/amebad/out/km4_boot_all.bin
              project/amebad/out/km0_km4_image2.bin
            ota: |
              project/amebad/out/OTA_All.bin
            elf: |
              platform/ameba-rtos-d/project/realtek_amebaD_va0_example/GCC-RELEASE/project_lp/asdk/image/target_img2.axf=>target_img2_lp.axf
              platform/ameba-rtos-d/project/realtek_amebaD_va0_example/GCC-RELEASE/project_hp/asdk/image/target_img2.axf=>target_img2_hp.axf

          - id: amebadplus
            display: Ameba Dplus (RTL8711Dx)
            submodules: |
              platform/ameba-rtos
            project_dir: project/ameba
            build_cmd: bash -lc "source env.sh && make amebadplus"
            merged: project/ameba/build_RTL8711Dx/Image_All.bin
            raw: |
              project/ameba/build_RTL8711Dx/km4_boot_all.bin
              project/ameba/build_RTL8711Dx/km0_km4_app.bin
            ota: |
              project/ameba/build_RTL8711Dx/ota_all.bin
            elf: |
              project/ameba/build_RTL8711Dx/build/project_km0/image/target_img2.axf=>target_img2_km0.axf
              project/ameba/build_RTL8711Dx/build/project_km4/image/target_img2.axf=>target_img2_km4.axf

          - id: amebagreen2
            display: Ameba Green 2 (RTL8711F)
            submodules: |
              platform/ameba-rtos
            project_dir: project/ameba
            build_cmd: bash -lc "source env.sh && make amebagreen2"
            merged: project/ameba/build_RTL8711F/Image_All.bin
            raw: |
              project/ameba/build_RTL8711F/amebagreen2_boot.bin
              project/ameba/build_RTL8711F/amebagreen2_app.bin
            ota: |
              project/ameba/build_RTL8711F/ota_all.bin
            elf: |
              project/ameba/build_RTL8711F/build/project_km4ns/image/target_img2.axf=>target_img2_km4ns.axf
              project/ameba/build_RTL8711F/build/project_km4tz/image/target_img2.axf=>target_img2_km4tz.axf

    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init required submodules
        run: |
          set -e
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            echo "::group::submodule update --init --recursive $path"
            git submodule update --init --recursive --depth 1 "$path"
            echo "::endgroup::"
          done <<'EOF'
          ${{ matrix.submodules }}
          EOF

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build python3 python3-pip python3-venv \
            ragel xz-utils ccache gcc-multilib

      - name: Install Python deps (Ameba newer)
        if: matrix.id == 'amebadplus' || matrix.id == 'amebagreen2'
        run: |
          # env.sh tries to create its own .venv, but on a fresh runner where
          # /opt/rtk-toolchain doesn't exist yet update_prebuilts() returns 1
          # *after* `rm -rf $BASE_DIR/.venv`, so env.sh exits before re-creating
          # the venv. cmake then runs axf2bin.py with the system python3 and
          # fails on `Miss module: json5`. Install requirements to system
          # python so any python interpreter cmake picks finds them.
          # --ignore-installed: requirements.txt pins cryptography==3.4.8 but
          # the runner has cryptography 41.0.7 from apt; pip can't uninstall
          # it (no RECORD file) so we just shadow it.
          sudo pip3 install --break-system-packages --ignore-installed \
            -r platform/ameba-rtos/tools/requirements.txt

      - name: Cache RTK toolchain (Ameba newer)
        if: matrix.id == 'amebadplus' || matrix.id == 'amebagreen2'
        uses: actions/cache@v4
        with:
          path: /opt/rtk-toolchain
          key: rtk-toolchain-${{ hashFiles('platform/ameba-rtos/env.sh') }}

      - name: Cache ASDK toolchain (Ameba D)
        if: matrix.id == 'amebad'
        uses: actions/cache@v4
        with:
          path: platform/ameba-rtos-d/project/realtek_amebaD_va0_example/toolchain
          key: asdk-amebad-${{ hashFiles('platform/ameba-rtos-d/project/realtek_amebaD_va0_example/GCC-RELEASE/project_hp/asdk/Makefile.include.gen') }}

      - name: Compute artifact name
        id: name
        run: |
          # at-<id>-<branch>-<sha7>; sanitize "/" in branch (e.g. release/x → release_x).
          ref="${GITHUB_REF_NAME//\//_}"
          short="${GITHUB_SHA:0:7}"
          tag="at-${{ matrix.id }}-${ref}-${short}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Artifact tag: $tag"

      - name: Build
        run: |
          set -e
          cd "${{ matrix.project_dir }}"
          ${{ matrix.build_cmd }}

      - name: Stage artifact files
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/${{ steps.name.outputs.tag }}"
          mkdir -p "$STAGE/raw"

          # Copy "src=>dest" or "src" into a directory, flattening to basename
          # (or the override name) — never preserves the source's path.
          stage_into() {
            local dest_dir="$1"
            local entry="$2"
            local src dst
            if [[ "$entry" == *"=>"* ]]; then
              src="${entry%%=>*}"
              dst="${entry##*=>}"
            else
              src="$entry"
              dst="$(basename "$entry")"
            fi
            if [ ! -e "$src" ]; then
              echo "::warning::missing artifact: $src"
              return 0
            fi
            cp -v "$src" "$dest_dir/$dst"
          }

          # Merged firmware → root, plus its MD5 next to it.
          merged='${{ matrix.merged }}'
          if [ -e "$merged" ]; then
            base="$(basename "$merged")"
            cp -v "$merged" "$STAGE/$base"
            ( cd "$STAGE" && md5sum "$base" > "$base.md5" )
            cat "$STAGE/$base.md5"
          else
            echo "::error::merged firmware missing: $merged"
            exit 1
          fi

          # OTA + ELF/AXF → root.
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            stage_into "$STAGE" "$line"
          done <<'EOF'
          ${{ matrix.ota }}
          ${{ matrix.elf }}
          EOF

          # Raw firmware → raw/.
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            stage_into "$STAGE/raw" "$line"
          done <<'EOF'
          ${{ matrix.raw }}
          EOF

          echo "::group::Tarball contents"
          ( cd "$RUNNER_TEMP" && find "${{ steps.name.outputs.tag }}" -type f | sort )
          echo "::endgroup::"

          tar -czf "$RUNNER_TEMP/${{ steps.name.outputs.tag }}.tar.gz" \
            -C "$RUNNER_TEMP" "${{ steps.name.outputs.tag }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.tag }}
          path: ${{ runner.temp }}/${{ steps.name.outputs.tag }}.tar.gz
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish rolling release
    needs: build
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten tarballs
        run: |
          mkdir -p release
          find dist -type f -name '*.tar.gz' -exec mv -t release {} +
          ls -l release

      - name: Delete previous "latest" assets
        # 文件名带 sha，每次 build 名字都会变；不删的话 release 页会堆历史
        # 资产。tag 不存在（首次发布）时静默跳过。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release view latest --repo "$GITHUB_REPOSITORY" --json assets \
              --jq '.assets[].name' \
            | while IFS= read -r asset; do
                [ -z "$asset" ] && continue
                echo "deleting $asset"
                gh release delete-asset latest "$asset" \
                  --repo "$GITHUB_REPOSITORY" --yes || true
              done
          fi

      - name: Publish/update rolling "latest" prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (${{ github.sha }})
          body: |
            Auto-built from `${{ github.ref_name }}` @ `${{ github.sha }}`.

            每个 tarball 内布局：
            - 根目录：合成固件（`Image_All.bin` / `whole_flash_data.bin`）+ 同名
              `*.md5`、OTA（`FW_OTA.bin.xz` / `OTA_All.bin` / `ota_all.bin`）、
              ELF / AXF。
            - `raw/` 子目录：用于合成的原始 bin，以及 BL602 / BL616 还附带
              `boot2.bin`、`partition_cfg.toml`、`bl_factory_params.dts`。
          prerelease: true
          files: release/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
